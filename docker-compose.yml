services:

  postgres:
    image: postgres:16

    container_name: postgres-db

    environment:
      POSTGRES_DB: ai_resume_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nidhi@123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    container_name: resume-ai-assistant

    ports:
      - "8080:8080"

    depends_on:
      - postgres

volumes:
  postgres_data: